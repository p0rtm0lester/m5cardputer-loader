; =====================================================================
;  M5Cardputer Loader  —  PlatformIO build configuration
; ---------------------------------------------------------------------
;  A resident "loader" firmware that lives in the FACTORY partition and
;  launches other firmwares stored as .bin files on the microSD card by
;  copying them into the OTA partition and rebooting into them.
;
;  Two build envs are provided:
;    [env:cardputer]          -> fast build, precompiled Arduino core.
;                                Auto-return-to-loader requires the
;                                loaded app to be launcher-aware
;                                (see include/loader_return.h).
;    [env:cardputer-rollback] -> builds the IDF/Arduino core from source
;                                with bootloader rollback ENABLED, so
;                                pressing RESET inside any loaded app
;                                automatically rolls back to the loader.
;                                Slower first build; no app changes needed.
; =====================================================================

[platformio]
default_envs = cardputer

[common]
; pioarduino platform — maintained Arduino-ESP32 3.x fork with custom_sdkconfig support
platform = https://github.com/pioarduino/platform-espressif32/releases/download/53.03.13/platform-espressif32.zip
board = esp32-s3-devkitc-1            ; M5Cardputer is an ESP32-S3FN8 (8MB flash, no PSRAM)
framework = arduino
monitor_speed = 115200
monitor_filters = esp32_exception_decoder
board_build.mcu = esp32s3
board_build.f_cpu = 240000000L
board_build.flash_mode = qio
board_build.flash_size = 8MB
board_upload.flash_size = 8MB
board_build.partitions = partitions.csv
build_flags =
    -DCORE_DEBUG_LEVEL=1
    -DARDUINO_USB_CDC_ON_BOOT=1        ; USB-CDC serial console
    -DBOARD_HAS_PSRAM=0
lib_deps =
    m5stack/M5Cardputer @ ^1.0.3       ; pulls in M5Unified + M5GFX

[env:cardputer]
platform   = ${common.platform}
board      = ${common.board}
framework  = ${common.framework}
monitor_speed = ${common.monitor_speed}
monitor_filters = ${common.monitor_filters}
board_build.mcu = ${common.board_build.mcu}
board_build.f_cpu = ${common.board_build.f_cpu}
board_build.flash_mode = ${common.board_build.flash_mode}
board_build.flash_size = ${common.board_build.flash_size}
board_upload.flash_size = ${common.board_upload.flash_size}
board_build.partitions = ${common.board_build.partitions}
build_flags = ${common.build_flags}
lib_deps   = ${common.lib_deps}

[env:cardputer-rollback]
extends = env:cardputer
; Rebuilds the core from source with rollback so loaded apps auto-return
; to the loader on reset. (First build is slow; subsequent builds cached.)
custom_sdkconfig =
    CONFIG_BOOTLOADER_APP_ROLLBACK_ENABLE=y
    CONFIG_APP_ROLLBACK_ENABLE=y
build_flags =
    ${common.build_flags}
    -DLOADER_ROLLBACK=1
