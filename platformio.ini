; =====================================================================
;  M5Cardputer Loader  —  PlatformIO build configuration
; ---------------------------------------------------------------------
;  Resident loader firmware that lives in the FACTORY partition and runs
;  firmwares stored as .bin on the microSD card (copy to ota_0 -> reboot).
;
;  Return-to-loader is handled by a CUSTOM BOOTLOADER hook (boot-once flag),
;  NOT by this build: pioarduino's arduino framework always flashes a
;  prebuilt bootloader. The hooked bootloader is built separately with
;  ./build-bootloader.sh  -> bl_build/bootloader.bin (flashed at 0x0).
;  See README.md and bootloader_components/loader_boot/.
;
;  This env builds ONLY the loader app (fast, ~11s). Reflash app changes
;  with:  ./flash-all.sh app    (writes just 0x10000 firmware.bin).
; =====================================================================

[platformio]
default_envs = cardputer

[env:cardputer]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/53.03.13/platform-espressif32.zip
board = esp32-s3-devkitc-1             ; M5Cardputer = ESP32-S3FN8 (8MB flash, no PSRAM)
framework = arduino
monitor_speed = 115200
monitor_filters = esp32_exception_decoder
board_build.mcu = esp32s3
board_build.f_cpu = 240000000L
board_build.flash_mode = dio           ; matches the bootloader + flash commands
board_build.flash_size = 8MB
board_upload.flash_size = 8MB
board_build.partitions = partitions.csv
build_flags =
    -DCORE_DEBUG_LEVEL=1
    -DARDUINO_USB_CDC_ON_BOOT=1         ; USB-CDC serial console
    -DBOARD_HAS_PSRAM=0
lib_deps =
    m5stack/M5Cardputer @ ^1.0.3        ; pulls in M5Unified + M5GFX
